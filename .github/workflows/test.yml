name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add uv to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies (core + dev)
        # Install project core deps + the dev extra. We skip the `tau2` extra
        # because tau2-bench is not on PyPI (installed separately via git in
        # downstream tau2_integration work).
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: Ruff check (lint)
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Run pytest
        # Tests mock the Anthropic API — no ANTHROPIC_API_KEY needed.
        run: uv run pytest tests/ -v
